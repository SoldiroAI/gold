<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Command Center | Autonomous Trading Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'terminal-green': '#00e5a0',
                        'terminal-purple': '#7c6bff',
                        'terminal-red': '#ff6b6b',
                        'terminal-orange': '#ffb347',
                        'bg-dark': '#0a0c0f',
                        'bg-surface': '#111318',
                        'border-dark': '#1e2230',
                    },
                    fontFamily: {
                        'mono': ['Space Mono', 'monospace'],
                        'sans': ['DM Sans', 'sans-serif'],
                    },
                    animation: {
                        'glow': 'glow 2s ease-in-out infinite',
                        'slide-in': 'slideIn 0.3s ease-out',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        glow: {
                            '0%, 100%': { opacity: 1 },
                            '50%': { opacity: 0.6 },
                        },
                        slideIn: {
                            '0%': { transform: 'translateX(-10px)', opacity: 0 },
                            '100%': { transform: 'translateX(0)', opacity: 1 },
                        },
                    },
                },
            },
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0c0f;
            font-family: 'DM Sans', sans-serif;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #111318; }
        ::-webkit-scrollbar-thumb { background: #2a2e3e; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #00e5a0; }
        .glow-text {
            text-shadow: 0 0 10px rgba(0, 229, 160, 0.3);
        }
        .card-hover {
            transition: all 0.2s ease;
        }
        .card-hover:hover {
            transform: translateY(-2px);
            border-color: rgba(0, 229, 160, 0.3);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
        @keyframes pulse-green {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        .live-dot {
            animation: pulse-green 1.5s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        // Mock data for the dashboard
        const mockDeals = [
            { id: 1, market: "BTC > $95K by March 31", side: "YES", confidence: 0.78, entryPrice: 0.42, currentPrice: 0.58, pnl: 38, agents: ["whale", "momentum"], status: "active" },
            { id: 2, market: "ETH ETF Approval 2025", side: "YES", confidence: 0.65, entryPrice: 0.31, currentPrice: 0.29, pnl: -6.5, agents: ["whale"], status: "active" },
            { id: 3, market: "Trump wins 2028 Election", side: "NO", confidence: 0.72, entryPrice: 0.63, currentPrice: 0.71, pnl: -12.7, agents: ["microstructure", "momentum"], status: "active" },
            { id: 4, market: "SOL > $250 by Q2", side: "YES", confidence: 0.55, entryPrice: 0.38, currentPrice: 0.42, pnl: 10.5, agents: ["arbitrage"], status: "closed" },
        ];

        const mockSignals = [
            { id: 1, type: "BUY", market: "BTC > $95K", confidence: 0.82, source: "whale_agent", timestamp: "12s ago", urgency: "high" },
            { id: 2, type: "BUY", market: "ETH > $4K", confidence: 0.67, source: "momentum_agent", timestamp: "45s ago", urgency: "medium" },
            { id: 3, type: "SELL", market: "Trump 2028", confidence: 0.71, source: "microstructure_agent", timestamp: "2m ago", urgency: "high" },
            { id: 4, type: "BUY", market: "SOL > $250", confidence: 0.58, source: "arbitrage_agent", timestamp: "3m ago", urgency: "low" },
        ];

        const mockAgents = [
            { name: "whale_agent", winRate: 0.68, trades: 142, pnl: 847, weight: 0.42, status: "active" },
            { name: "microstructure_agent", winRate: 0.61, trades: 89, pnl: 423, weight: 0.23, status: "active" },
            { name: "momentum_agent", winRate: 0.54, trades: 67, pnl: 189, weight: 0.18, status: "active" },
            { name: "arbitrage_agent", winRate: 0.72, trades: 34, pnl: 256, weight: 0.17, status: "active" },
        ];

        const mockPortfolio = {
            totalValue: 187.50,
            initialCapital: 200,
            dailyPnl: -4.25,
            weeklyPnl: 12.80,
            openPositions: 3,
            exposure: { crypto: 42, politics: 28, sports: 0, macro: 30 },
        };

        // React app with Framer Motion
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = FramerMotion;

        // Lucide icons - using simple emoji fallback for CDN
        const Icons = {
            TrendingUp: () => <span className="text-terminal-green">📈</span>,
            TrendingDown: () => <span className="text-terminal-red">📉</span>,
            Activity: () => <span className="text-terminal-purple">⚡</span>,
            Wallet: () => <span className="text-terminal-green">💼</span>,
            Brain: () => <span className="text-terminal-purple">🧠</span>,
            AlertTriangle: () => <span className="text-terminal-orange">⚠️</span>,
            X: () => <span>✕</span>,
            ArrowRight: () => <span>→</span>,
            Zap: () => <span className="text-terminal-green">⚡</span>,
            Bot: () => <span>🤖</span>,
        };

        // Signal Feed Component
        const SignalFeed = ({ signals }) => {
            return (
                <div className="bg-bg-surface border-b border-border-dark">
                    <div className="px-6 py-3 flex items-center justify-between border-b border-border-dark/50">
                        <div className="flex items-center gap-3">
                            <div className="flex items-center gap-2">
                                <span className="text-terminal-green text-sm">●</span>
                                <span className="text-xs font-mono text-gray-400 tracking-wider">LIVE SIGNAL FEED</span>
                            </div>
                            <div className="h-4 w-px bg-border-dark"></div>
                            <span className="text-xs text-gray-500">Real-time intelligence</span>
                        </div>
                        <div className="flex items-center gap-2">
                            <span className="w-1.5 h-1.5 rounded-full bg-terminal-green live-dot"></span>
                            <span className="text-[10px] font-mono text-gray-500">CONNECTED</span>
                        </div>
                    </div>
                    <div className="flex overflow-x-auto scrollbar-thin px-6 py-3 gap-4">
                        {signals.map((signal, idx) => (
                            <motion.div
                                key={signal.id}
                                initial={{ opacity: 0, x: -20 }}
                                animate={{ opacity: 1, x: 0 }}
                                transition={{ delay: idx * 0.05 }}
                                className={`flex-shrink-0 flex items-center gap-3 px-4 py-2 rounded-lg border ${signal.urgency === 'high' ? 'border-terminal-green/30 bg-terminal-green/5' : 'border-border-dark bg-bg-dark/50'} hover:border-terminal-green/50 transition-all cursor-pointer`}
                            >
                                <div className={`w-1.5 h-1.5 rounded-full ${signal.type === 'BUY' ? 'bg-terminal-green' : 'bg-terminal-red'}`}></div>
                                <span className={`text-xs font-mono font-bold ${signal.type === 'BUY' ? 'text-terminal-green' : 'text-terminal-red'}`}>{signal.type}</span>
                                <span className="text-sm text-white font-medium">{signal.market}</span>
                                <span className="text-xs font-mono text-terminal-purple">{Math.round(signal.confidence * 100)}% conf</span>
                                <span className="text-[10px] font-mono text-gray-500 bg-border-dark/50 px-2 py-0.5 rounded">{signal.source}</span>
                                <span className="text-[10px] text-gray-600">{signal.timestamp}</span>
                            </motion.div>
                        ))}
                    </div>
                </div>
            );
        };

        // Agent Performance Strip
        const AgentPerformanceStrip = ({ agents }) => {
            return (
                <div className="bg-bg-dark border-y border-border-dark">
                    <div className="px-6 py-3 flex items-center justify-between">
                        <div className="flex items-center gap-4 text-xs font-mono text-gray-400">
                            <span>AGENT PERFORMANCE</span>
                            <span className="text-terminal-green">●</span>
                            <span className="text-gray-500">Dynamic weights updating</span>
                        </div>
                        <div className="flex gap-6">
                            {agents.map((agent, idx) => (
                                <motion.div
                                    key={agent.name}
                                    initial={{ scale: 0.95 }}
                                    animate={{ scale: 1 }}
                                    className="flex items-center gap-3"
                                >
                                    <div className="flex items-center gap-2">
                                        <div className={`w-2 h-2 rounded-full ${agent.status === 'active' ? 'bg-terminal-green' : 'bg-gray-600'}`}></div>
                                        <span className="text-xs font-mono text-gray-300">{agent.name.replace('_agent', '')}</span>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <span className="text-xs text-terminal-green font-mono">{Math.round(agent.winRate * 100)}%</span>
                                        <div className="w-16 h-1 bg-border-dark rounded-full overflow-hidden">
                                            <div className="h-full bg-terminal-green rounded-full" style={{ width: `${agent.winRate * 100}%` }}></div>
                                        </div>
                                        <span className="text-[10px] text-gray-500">w:{(agent.weight * 100).toFixed(0)}%</span>
                                    </div>
                                </motion.div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // Portfolio Panel Component (Right Sidebar)
        const PortfolioPanel = ({ portfolio, deals }) => {
            const activeDeals = deals.filter(d => d.status === 'active');
            const totalExposure = activeDeals.reduce((sum, d) => sum + (d.entryPrice * 100), 0);
            
            return (
                <div className="w-80 bg-bg-surface border-l border-border-dark flex flex-col">
                    <div className="p-5 border-b border-border-dark">
                        <div className="flex items-center justify-between mb-4">
                            <h3 className="text-sm font-mono text-gray-400 tracking-wider">PORTFOLIO</h3>
                            <span className="text-[10px] font-mono text-terminal-green">● LIVE</span>
                        </div>
                        <div className="flex justify-between items-baseline mb-2">
                            <span className="text-2xl font-bold text-white">${portfolio.totalValue.toFixed(2)}</span>
                            <span className={`text-sm font-mono ${portfolio.dailyPnl >= 0 ? 'text-terminal-green' : 'text-terminal-red'}`}>
                                {portfolio.dailyPnl >= 0 ? '+' : ''}{portfolio.dailyPnl.toFixed(2)}%
                            </span>
                        </div>
                        <div className="flex justify-between text-xs text-gray-500 mb-4">
                            <span>Initial: ${portfolio.initialCapital}</span>
                            <span>Weekly: {portfolio.weeklyPnl >= 0 ? '+' : ''}{portfolio.weeklyPnl.toFixed(2)}%</span>
                        </div>
                        <div className="grid grid-cols-2 gap-3 text-xs">
                            <div className="bg-bg-dark p-2 rounded border border-border-dark">
                                <div className="text-gray-500">Open Positions</div>
                                <div className="text-xl font-mono text-terminal-green">{portfolio.openPositions}</div>
                            </div>
                            <div className="bg-bg-dark p-2 rounded border border-border-dark">
                                <div className="text-gray-500">Buying Power</div>
                                <div className="text-xl font-mono text-white">${(portfolio.totalValue * 0.7).toFixed(0)}</div>
                            </div>
                        </div>
                    </div>
                    
                    <div className="flex-1 p-5 overflow-y-auto">
                        <div className="text-xs font-mono text-gray-500 mb-3">EXPOSURE BY CATEGORY</div>
                        {Object.entries(portfolio.exposure).map(([cat, val]) => (
                            <div key={cat} className="mb-3">
                                <div className="flex justify-between text-xs mb-1">
                                    <span className="capitalize text-gray-400">{cat}</span>
                                    <span className="font-mono text-terminal-green">{val}%</span>
                                </div>
                                <div className="w-full h-1.5 bg-border-dark rounded-full overflow-hidden">
                                    <div className="h-full bg-terminal-green rounded-full" style={{ width: `${val}%` }}></div>
                                </div>
                            </div>
                        ))}
                        
                        <div className="mt-6 pt-4 border-t border-border-dark">
                            <div className="text-xs font-mono text-gray-500 mb-3">ACTIVE POSITIONS</div>
                            {activeDeals.map(deal => (
                                <div key={deal.id} className="mb-3 p-2 bg-bg-dark rounded border border-border-dark">
                                    <div className="flex justify-between text-xs mb-1">
                                        <span className="text-gray-300 truncate max-w-[140px]">{deal.market.substring(0, 25)}</span>
                                        <span className={`font-mono ${deal.pnl >= 0 ? 'text-terminal-green' : 'text-terminal-red'}`}>
                                            {deal.pnl >= 0 ? '+' : ''}{deal.pnl}%
                                        </span>
                                    </div>
                                    <div className="flex justify-between text-[10px] text-gray-500">
                                        <span>Entry: ${deal.entryPrice}</span>
                                        <span>Current: ${deal.currentPrice}</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                    
                    <div className="p-4 border-t border-border-dark">
                        <div className="flex items-center justify-between text-xs">
                            <span className="text-gray-500">Risk Budget Remaining</span>
                            <span className="font-mono text-terminal-green">$142.50</span>
                        </div>
                        <div className="w-full h-1.5 bg-border-dark rounded-full mt-2 overflow-hidden">
                            <div className="h-full bg-terminal-green rounded-full" style={{ width: '71%' }}></div>
                        </div>
                    </div>
                </div>
            );
        };

        // Deal Card Component
        const DealCard = ({ deal, onClick }) => {
            const isActive = deal.status === 'active';
            return (
                <motion.div
                    whileHover={{ y: -2 }}
                    onClick={() => onClick(deal)}
                    className="bg-bg-surface border border-border-dark rounded-lg p-5 cursor-pointer transition-all hover:border-terminal-green/40 hover:shadow-xl"
                >
                    <div className="flex justify-between items-start mb-3">
                        <div className="flex items-center gap-2">
                            <div className={`w-2 h-2 rounded-full ${isActive ? 'bg-terminal-green animate-pulse' : 'bg-gray-600'}`}></div>
                            <span className="text-xs font-mono text-gray-500">{deal.side}</span>
                        </div>
                        <div className="flex items-center gap-1">
                            {deal.agents.map(agent => (
                                <span key={agent} className="text-[9px] font-mono bg-border-dark/50 px-1.5 py-0.5 rounded text-gray-400">{agent}</span>
                            ))}
                        </div>
                    </div>
                    <h4 className="text-white font-medium mb-3 text-sm leading-relaxed">{deal.market}</h4>
                    <div className="flex justify-between items-center mb-3">
                        <div>
                            <div className="text-xs text-gray-500">Confidence</div>
                            <div className="text-sm font-mono text-terminal-green">{Math.round(deal.confidence * 100)}%</div>
                        </div>
                        <div className="text-right">
                            <div className="text-xs text-gray-500">P&L</div>
                            <div className={`text-sm font-mono ${deal.pnl >= 0 ? 'text-terminal-green' : 'text-terminal-red'}`}>
                                {deal.pnl >= 0 ? '+' : ''}{deal.pnl}%
                            </div>
                        </div>
                    </div>
                    <div className="flex justify-between text-xs text-gray-500 pt-2 border-t border-border-dark/50">
                        <span>Entry: ${deal.entryPrice}</span>
                        <span className="flex items-center gap-1">{Icons.ArrowRight()} ${deal.currentPrice}</span>
                    </div>
                </motion.div>
            );
        };

        // Deal Room Component (Modal-style)
        const DealRoom = ({ deal, onClose }) => {
            return (
                <motion.div
                    initial={{ opacity: 0 }}
                    animate={{ opacity: 1 }}
                    exit={{ opacity: 0 }}
                    className="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-6"
                    onClick={onClose}
                >
                    <motion.div
                        initial={{ scale: 0.95, y: 20 }}
                        animate={{ scale: 1, y: 0 }}
                        exit={{ scale: 0.95, y: 20 }}
                        className="bg-bg-surface border border-border-dark rounded-2xl max-w-3xl w-full max-h-[85vh] overflow-y-auto"
                        onClick={(e) => e.stopPropagation()}
                    >
                        <div className="sticky top-0 bg-bg-surface border-b border-border-dark p-5 flex justify-between items-center">
                            <div>
                                <div className="flex items-center gap-2 mb-1">
                                    <span className="text-xs font-mono text-terminal-green">DEAL ROOM</span>
                                    <span className={`px-2 py-0.5 rounded text-[10px] font-mono ${deal.status === 'active' ? 'bg-terminal-green/20 text-terminal-green' : 'bg-gray-700/50 text-gray-400'}`}>
                                        {deal.status.toUpperCase()}
                                    </span>
                                </div>
                                <h2 className="text-xl font-bold text-white">{deal.market}</h2>
                            </div>
                            <button onClick={onClose} className="text-gray-500 hover:text-white transition p-2">
                                ✕
                            </button>
                        </div>
                        
                        <div className="p-6 space-y-6">
                            {/* Intelligence Summary */}
                            <div className="bg-gradient-to-r from-terminal-green/5 to-terminal-purple/5 border border-terminal-green/20 rounded-lg p-5">
                                <div className="flex items-center gap-2 mb-3">
                                    <span className="text-terminal-green">🧠</span>
                                    <span className="text-sm font-mono text-gray-300">Intelligence Summary</span>
                                </div>
                                <p className="text-gray-300 text-sm leading-relaxed">
                                    Signal generated by <strong className="text-terminal-green">{deal.agents.join(', ')}</strong> with {Math.round(deal.confidence * 100)}% confidence. 
                                    {deal.agents.includes('whale') && ' Two high-win-rate wallets entered this position within the last 15 minutes. '}
                                    {deal.agents.includes('momentum') && ' Price momentum shows strong accumulation pattern. '}
                                    {deal.agents.includes('microstructure') && ' Order book imbalance detected — aggressive buying pressure. '}
                                    {deal.agents.includes('arbitrage') && ' Cross-market spread of 4.2¢ creates statistical edge.'}
                                </p>
                            </div>
                            
                            {/* Agent Debate */}
                            <div>
                                <div className="flex items-center gap-2 mb-4">
                                    <span className="text-terminal-purple">⚡</span>
                                    <span className="text-sm font-mono text-gray-400">AGENT CONSENSUS</span>
                                </div>
                                <div className="space-y-3">
                                    {deal.agents.includes('whale') && (
                                        <div className="flex items-start gap-3 p-3 bg-bg-dark rounded-lg border border-border-dark">
                                            <div className="w-8 h-8 rounded-full bg-terminal-green/10 flex items-center justify-center text-terminal-green">🐋</div>
                                            <div>
                                                <div className="text-sm font-medium text-white">Whale Agent</div>
                                                <div className="text-xs text-gray-400 mt-1">2 confirming wallets (0x3A7...F2, 0x8B1...C4) with combined win rate 68% — strong conviction signal</div>
                                                <div className="text-[10px] font-mono text-terminal-green mt-2">Confidence: 82% | Weight: 0.42</div>
                                            </div>
                                        </div>
                                    )}
                                    {deal.agents.includes('momentum') && (
                                        <div className="flex items-start gap-3 p-3 bg-bg-dark rounded-lg border border-border-dark">
                                            <div className="w-8 h-8 rounded-full bg-terminal-orange/10 flex items-center justify-center text-terminal-orange">📈</div>
                                            <div>
                                                <div className="text-sm font-medium text-white">Momentum Agent</div>
                                                <div className="text-xs text-gray-400 mt-1">Price velocity +0.8% per minute over last 5m — trending above VWAP with volume confirmation</div>
                                                <div className="text-[10px] font-mono text-terminal-orange mt-2">Confidence: 67% | Weight: 0.18</div>
                                            </div>
                                        </div>
                                    )}
                                    {deal.agents.includes('microstructure') && (
                                        <div className="flex items-start gap-3 p-3 bg-bg-dark rounded-lg border border-border-dark">
                                            <div className="w-8 h-8 rounded-full bg-terminal-purple/10 flex items-center justify-center text-terminal-purple">📊</div>
                                            <div>
                                                <div className="text-sm font-medium text-white">Microstructure Agent</div>
                                                <div className="text-xs text-gray-400 mt-1">Order book imbalance 2.3:1 buy/sell — liquidity absorption detected at ask levels</div>
                                                <div className="text-[10px] font-mono text-terminal-purple mt-2">Confidence: 71% | Weight: 0.23</div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                            
                            {/* Risk Panel */}
                            <div className="grid grid-cols-2 gap-4">
                                <div className="border border-border-dark rounded-lg p-4">
                                    <div className="text-xs text-gray-500 mb-2">POSITION RISK</div>
                                    <div className="text-2xl font-mono text-terminal-red">-30%</div>
                                    <div className="text-xs text-gray-500 mt-1">Stop loss threshold</div>
                                    <div className="mt-3 text-[10px] text-gray-600">Current drawdown from entry: {(deal.entryPrice - deal.currentPrice) / deal.entryPrice * 100 > 0 ? '-' : ''}{Math.abs(((deal.entryPrice - deal.currentPrice) / deal.entryPrice * 100)).toFixed(1)}%</div>
                                </div>
                                <div className="border border-border-dark rounded-lg p-4">
                                    <div className="text-xs text-gray-500 mb-2">TAKE PROFIT</div>
                                    <div className="text-2xl font-mono text-terminal-green">+50%</div>
                                    <div className="text-xs text-gray-500 mt-1">Target exit level</div>
                                    <div className="mt-3 text-[10px] text-gray-600">Est. exit price: ${(deal.entryPrice * 1.5).toFixed(2)}</div>
                                </div>
                            </div>
                            
                            {/* Execution Strategy */}
                            <div className="bg-bg-dark rounded-lg p-4 border border-border-dark">
                                <div className="text-xs font-mono text-gray-400 mb-2">EXECUTION STRATEGY</div>
                                <div className="flex justify-between text-sm">
                                    <span className="text-gray-300">Order Type:</span>
                                    <span className="font-mono text-terminal-green">Limit Order (Maker)</span>
                                </div>
                                <div className="flex justify-between text-sm mt-2">
                                    <span className="text-gray-300">Price:</span>
                                    <span className="font-mono text-white">${deal.currentPrice - 0.01} (1¢ below ask)</span>
                                </div>
                                <div className="flex justify-between text-sm mt-2">
                                    <span className="text-gray-300">Size:</span>
                                    <span className="font-mono text-white">$18.50 (9.25% of capital)</span>
                                </div>
                            </div>
                        </div>
                    </motion.div>
                </motion.div>
            );
        };

        // Main Dashboard Component
        const Dashboard = () => {
            const [deals, setDeals] = useState(mockDeals);
            const [signals, setSignals] = useState(mockSignals);
            const [agents, setAgents] = useState(mockAgents);
            const [portfolio, setPortfolio] = useState(mockPortfolio);
            const [selectedDeal, setSelectedDeal] = useState(null);
            
            const activeDeals = deals.filter(d => d.status === 'active');
            
            return (
                <div className="min-h-screen bg-bg-dark">
                    {/* Top Bar - Signal Feed */}
                    <SignalFeed signals={signals} />
                    
                    {/* Main Content Area with Sidebar */}
                    <div className="flex">
                        {/* Main Content */}
                        <div className="flex-1 min-w-0">
                            {/* Agent Performance Strip */}
                            <AgentPerformanceStrip agents={agents} />
                            
                            {/* Dashboard Content */}
                            <div className="p-6">
                                <div className="flex justify-between items-center mb-6">
                                    <div>
                                        <h1 className="text-2xl font-bold text-white tracking-tight">Command Center</h1>
                                        <p className="text-gray-500 text-sm mt-1">Autonomous trading intelligence • {activeDeals.length} active positions</p>
                                    </div>
                                    <div className="flex items-center gap-2 px-3 py-2 bg-bg-surface border border-border-dark rounded-lg">
                                        <span className="w-2 h-2 rounded-full bg-terminal-green live-dot"></span>
                                        <span className="text-xs font-mono text-gray-400">AGENTS ACTIVE</span>
                                        <span className="text-xs font-mono text-terminal-green">4/4</span>
                                    </div>
                                </div>
                                
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
                                    {activeDeals.map((deal, idx) => (
                                        <DealCard key={deal.id} deal={deal} onClick={setSelectedDeal} />
                                    ))}
                                </div>
                                
                                {activeDeals.length === 0 && (
                                    <div className="text-center py-16">
                                        <div className="text-4xl mb-3">🤖</div>
                                        <p className="text-gray-500">No active deals. Agents are scanning for opportunities...</p>
                                    </div>
                                )}
                            </div>
                        </div>
                        
                        {/* Portfolio Panel - Right Sidebar */}
                        <PortfolioPanel portfolio={portfolio} deals={deals} />
                    </div>
                    
                    {/* Deal Room Modal */}
                    <AnimatePresence>
                        {selectedDeal && (
                            <DealRoom deal={selectedDeal} onClose={() => setSelectedDeal(null)} />
                        )}
                    </AnimatePresence>
                </div>
            );
        };
        
        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(Dashboard, null));
    </script>
</body>
</html>
